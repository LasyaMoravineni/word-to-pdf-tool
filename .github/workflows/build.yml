name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Build EXE
      run: pyinstaller --onefile --windowed gui_app.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: doc-to-pdf-exe
        path: dist/gui_app.exe
